<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neon-pulse {
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.2);
            border-radius: 10px;
        }
        #mobile-drawer {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drawer-open #mobile-drawer {
            transform: translateX(0);
        }
        .drawer-closed #mobile-drawer {
            transform: translateX(-100%);
        }
        .drawer-overlay {
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .drawer-open .drawer-overlay {
            opacity: 1;
            pointer-events: auto;
        }
        .contact-card {
            transition: all 0.2s ease;
        }
        .contact-card:active {
            transform: scale(0.98);
        }
    </style>

<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen drawer-closed">
<!-- ... HTML body exactly as original ... -->

<script>
        // ---------- Backend URL ----------
        const BACKEND_URL = "https://ngxchat-backend-production.up.railway.app";

        let onlineUsers = [];
        let currentUser = sessionStorage.getItem('ngx_user_identity') || "Guest";

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        async function fetchOnlineUsers() {
            try {
                // ---------- Use BACKEND_URL ----------
                const response = await fetch(BACKEND_URL + '/api/online');
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                onlineUsers = data.users.filter(user => user !== currentUser);
                renderContacts();
                updateDrawerUserList();
            } catch (err) {
                console.error('Failed to fetch online users:', err);
                document.getElementById('contacts-list').innerHTML = '<div class="text-center text-error/70 py-8">⚠️ Failed to load online users</div>';
            }
        }

        function renderContacts() {
            const container = document.getElementById('contacts-list');
            if (!container) return;
            if (onlineUsers.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 px-4 text-center">
                        <span class="material-symbols-outlined text-6xl text-on-surface-variant/30 mb-4">waving_hand</span>
                        <h3 class="text-base font-semibold text-on-surface mb-1">No other users online</h3>
                        <p class="text-xs text-on-surface-variant/60">Invite a friend or wait for someone to join</p>
                    </div>
                `;
                return;
            }
            let html = '';
            for (const user of onlineUsers) {
                html += `
                    <div class="contact-card glass-panel p-3 rounded-xl flex items-center gap-3 cursor-pointer w-full" data-name="${escapeHtml(user)}">
                        <div class="relative shrink-0">
                            <div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center border border-primary-container/30">
                                <span class="material-symbols-outlined text-primary-container text-3xl">person</span>
                            </div>
                            <span class="absolute bottom-0 right-0 w-3 h-3 bg-primary-container rounded-full border-2 border-background"></span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-headline-md text-sm font-bold text-on-surface truncate">${escapeHtml(user)}</h3>
                            <p class="text-[10px] text-primary-container/80 truncate">Online · Available</p>
                        </div>
                        <a href="/chat?username=${encodeURIComponent(currentUser)}" class="bg-primary-container/20 text-primary-container py-3 px-4 rounded-lg hover:bg-primary-container/30 transition-all shrink-0">
                            <span class="material-symbols-outlined text-2xl">chat_bubble</span>
                        </a>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function updateDrawerUserList() {
            const drawerContainer = document.getElementById('user-list-container');
            if (!drawerContainer) return;
            if (onlineUsers.length === 0) {
                drawerContainer.innerHTML = '<div class="px-3 py-2 text-[9px] text-on-surface-variant/40">No other users online</div>';
                return;
            }
            let html = '';
            onlineUsers.forEach(user => {
                html += `
                    <div class="bg-primary-container/5 border-l-2 border-primary-container px-3 py-2">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 shrink-0 rounded-lg bg-surface-container-high flex items-center justify-center border border-primary-container/20">
                                <span class="material-symbols-outlined text-primary-container text-sm">person</span>
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <h3 class="text-xs font-bold text-on-surface truncate">${escapeHtml(user)}</h3>
                                <p class="text-[9px] text-primary-container/80 truncate">online</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            drawerContainer.innerHTML = html;
        }

        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            if (!searchInput) return;
            searchInput.addEventListener('input', function() {
                const query = this.value.toLowerCase();
                const cards = document.querySelectorAll('.contact-card');
                cards.forEach(card => {
                    const name = card.getAttribute('data-name')?.toLowerCase() || '';
                    if (name.includes(query)) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        }

        function toggleDrawer() {
            const body = document.body;
            if (body.classList.contains('drawer-closed')) {
                body.classList.remove('drawer-closed');
                body.classList.add('drawer-open');
            } else {
                body.classList.remove('drawer-open');
                body.classList.add('drawer-closed');
            }
        }
        document.getElementById('drawer-backdrop').addEventListener('click', toggleDrawer);

        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'class') {
                    if (document.body.classList.contains('drawer-open')) {
                        document.body.style.overflow = 'hidden';
                    } else {
                        document.body.style.overflow = '';
                    }
                }
            });
        });
        observer.observe(document.body, { attributes: true });

        document.getElementById('create-room-btn')?.addEventListener('click', () => window.location.href = '/chat');
        document.getElementById('join-room-btn')?.addEventListener('click', () => window.location.href = '/chat');
        document.getElementById('global-chat-btn')?.addEventListener('click', () => window.location.href = '/chat');

        fetchOnlineUsers();
        setInterval(fetchOnlineUsers, 3000);
        setupSearch();
    </script>
</body>
</html>
