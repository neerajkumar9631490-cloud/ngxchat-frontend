<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"/>
<title>NGX Chat | Contacts</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;family=Inter:wght@400;600&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary": "#313030",
                    "tertiary": "#fcf8f8",
                    "on-tertiary": "#313030",
                    "primary-container": "#00ff41",
                    "error-container": "#93000a",
                    "surface-dim": "#0c160a",
                    "surface-container-low": "#141e12",
                    "on-error-container": "#ffdad6",
                    "secondary-container": "#4a4949",
                    "on-error": "#690005",
                    "surface-variant": "#2d382a",
                    "on-secondary-fixed-variant": "#474646",
                    "surface-container": "#182216",
                    "on-secondary-container": "#bab8b7",
                    "on-primary": "#003907",
                    "outline": "#84967e",
                    "tertiary-fixed-dim": "#c9c6c5",
                    "on-tertiary-container": "#626060",
                    "on-primary-container": "#007117",
                    "on-surface": "#dae6d2",
                    "secondary-fixed": "#e5e2e1",
                    "secondary": "#c8c6c5",
                    "surface-tint": "#00e639",
                    "primary": "#ebffe2",
                    "surface-container-lowest": "#071106",
                    "on-primary-fixed": "#002203",
                    "inverse-surface": "#dae6d2",
                    "on-background": "#dae6d2",
                    "inverse-on-surface": "#283326",
                    "on-primary-fixed-variant": "#00530e",
                    "secondary-fixed-dim": "#c8c6c5",
                    "inverse-primary": "#006e16",
                    "background": "#0c160a",
                    "primary-fixed": "#72ff70",
                    "on-tertiary-fixed-variant": "#474646",
                    "primary-fixed-dim": "#00e639",
                    "on-secondary-fixed": "#1c1b1b",
                    "tertiary-fixed": "#e5e2e1",
                    "on-tertiary-fixed": "#1c1b1b",
                    "error": "#ffb4ab",
                    "tertiary-container": "#dfdcdb",
                    "surface": "#0c160a",
                    "outline-variant": "#3b4b37",
                    "on-surface-variant": "#b9ccb2",
                    "surface-bright": "#313c2e",
                    "surface-container-highest": "#2d382a",
                    "surface-container-high": "#222d20"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "stack-md": "16px",
                    "container-padding-desktop": "40px",
                    "unit": "4px",
                    "stack-lg": "32px",
                    "gutter": "24px",
                    "container-padding-mobile": "20px",
                    "stack-sm": "8px"
            },
            "fontFamily": {
                    "display-lg": ["Outfit"],
                    "body-md": ["Inter"],
                    "mono-code": ["JetBrains Mono"],
                    "headline-md": ["Outfit"],
                    "label-caps": ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neon-pulse {
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.2);
            border-radius: 10px;
        }
        #mobile-drawer {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drawer-open #mobile-drawer {
            transform: translateX(0);
        }
        .drawer-closed #mobile-drawer {
            transform: translateX(-100%);
        }
        .drawer-overlay {
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .drawer-open .drawer-overlay {
            opacity: 1;
            pointer-events: auto;
        }
        .contact-card {
            transition: all 0.2s ease;
        }
        .contact-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen drawer-closed">
<div class="drawer-overlay fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] opacity-0" id="drawer-backdrop"></div>
<aside class="fixed left-0 top-0 h-full w-72 bg-surface-dim/95 backdrop-blur-3xl border-r border-white/5 z-[70] flex flex-col shadow-2xl" id="mobile-drawer">
<div class="px-4 py-4 flex justify-between items-center border-b border-white/10">
<div>
<div class="font-display-lg text-primary-fixed-dim text-xl tracking-tighter italic">NGX CORE</div>
<div class="font-label-caps text-[8px] text-on-surface-variant opacity-60">Protocol v4.2</div>
</div>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 text-on-surface-variant" onclick="toggleDrawer()">
<span class="material-symbols-outlined text-base">close</span>
</button>
</div>
<div class="flex-1 px-2 py-3 space-y-1 overflow-y-auto custom-scrollbar">
<a href="/history" class="px-3 py-1.5 rounded-lg text-on-surface-variant flex items-center gap-2 text-sm hover:bg-white/5 transition-all">
    <span class="material-symbols-outlined text-base">history</span>
    <span class="font-label-caps text-[11px]">History</span>
</a>
<a href="/chat" class="px-3 py-1.5 rounded-lg text-on-surface-variant flex items-center gap-2 text-sm hover:bg-white/5 transition-all">
<span class="material-symbols-outlined text-base">chat_bubble</span>
<span class="font-label-caps text-[11px]">Messages</span>
</a>
<div class="px-3 py-1.5 rounded-lg bg-primary-container/10 text-primary-container border-r-2 border-primary-container flex items-center gap-2 text-sm">
<span class="material-symbols-outlined text-base">group</span>
<span class="font-label-caps text-[11px]">Contacts</span>
</div>
<div class="pt-4 pb-1 px-3">
<span class="font-label-caps text-[9px] text-on-surface-variant opacity-40 uppercase tracking-widest">Active Uplinks</span>
</div>
<div id="user-list-container" class="space-y-1"></div>
<div class="pt-4 pb-1 px-3">
<span class="font-label-caps text-[9px] text-on-surface-variant opacity-40 uppercase tracking-widest">Private Rooms</span>
</div>
<button id="create-room-btn" class="w-full bg-primary-container/20 text-primary-container py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-primary-container/30 transition-all text-sm">
<span class="material-symbols-outlined text-base">add</span>
<span class="font-label-caps text-[11px]">New Uplink</span>
</button>
<button id="join-room-btn" class="w-full mt-1 bg-white/5 text-on-surface-variant py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-white/10 transition-all text-sm">
<span class="material-symbols-outlined text-base">login</span>
<span class="font-label-caps text-[11px]">Join Room</span>
</button>
<button id="global-chat-btn" class="w-full mt-1 bg-primary-container/5 text-primary-container/80 py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-primary-container/20 transition-all text-sm">
<span class="material-symbols-outlined text-base">public</span>
<span class="font-label-caps text-[11px]">Global</span>
</button>
</div>
<div class="px-4 py-3 border-t border-white/5">
<div class="text-center text-[9px] text-on-surface-variant/50">CONTACTS</div>
</div>
</aside>
<div class="relative z-10 flex h-full w-full flex-col">
<header class="bg-surface-container/80 backdrop-blur-xl border-b border-white/5 px-4 h-14 flex justify-between items-center shadow-[0_0_15px_rgba(0,255,65,0.1)] shrink-0">
<div class="flex items-center gap-2">
<button class="w-8 h-8 flex items-center justify-center text-on-surface hover:text-primary-container transition-colors active:bg-white/5 rounded-full" onclick="toggleDrawer()">
<span class="material-symbols-outlined text-xl">menu</span>
</button>
<h1 class="font-display-lg text-base text-primary-container tracking-tighter">Contacts</h1>
</div>
<div class="flex items-center gap-2">
<button class="w-8 h-8 flex items-center justify-center text-on-surface-variant hover:text-primary-container transition-colors relative">
<span class="material-symbols-outlined text-xl">notifications</span>
<span class="absolute top-1.5 right-1.5 w-1.5 h-1.5 bg-primary-container rounded-full neon-pulse"></span>
</button>
<div class="w-7 h-7 rounded-full border border-primary-container/30 p-0.5 overflow-hidden flex items-center justify-center bg-surface-container">
<span class="material-symbols-outlined text-primary-container text-base">account_circle</span>
</div>
</div>
</header>
<main class="flex-1 overflow-y-auto px-1 py-3 space-y-3 custom-scrollbar pb-32">
    <div class="relative mx-1">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-base">search</span>
        <input type="text" id="search-input" class="w-full bg-surface-container-high border border-white/10 rounded-xl py-2.5 pl-9 pr-3 text-sm text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary-container transition-all" placeholder="Search online users...">
    </div>
    <div id="contacts-list" class="space-y-2">
        <div class="text-center text-on-surface-variant/50 py-8">Loading online users...</div>
    </div>
</main>
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-1.5 h-14 bg-surface-container-highest/95 backdrop-blur-xl border-t border-white/10 z-[50] shadow-[0_-5px_20px_rgba(0,0,0,0.5)]">
<a href="/about" class="flex flex-col items-center justify-center flex-1 h-full text-on-surface-variant active:bg-white/5 rounded-lg transition-all">
<span class="material-symbols-outlined text-base">info</span>
<span class="font-label-caps text-[8px] mt-0.5">About</span>
</a>
<a href="/chat" class="flex flex-col items-center justify-center flex-1 h-full text-on-surface-variant active:bg-white/5 rounded-lg transition-all">
<span class="material-symbols-outlined text-base">chat_bubble</span>
<span class="font-label-caps text-[8px] mt-0.5">Chat</span>
</a>
<a href="/profile" class="flex flex-col items-center justify-center flex-1 h-full text-on-surface-variant active:bg-white/5 rounded-lg transition-all">
<span class="material-symbols-outlined text-base">person</span>
<span class="font-label-caps text-[8px] mt-0.5">Profile</span>
</a>
</nav>
</div>
<script>
        // ---------- Backend URL ----------
        const BACKEND_URL = "https://ngxchat-backend-production.up.railway.app";

        let onlineUsers = [];
        let currentUser = sessionStorage.getItem('ngx_user_identity') || "Guest";

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        async function fetchOnlineUsers() {
            try {
                // ---------- Use BACKEND_URL ----------
                const response = await fetch(BACKEND_URL + '/api/online');
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                onlineUsers = data.users.filter(user => user !== currentUser);
                renderContacts();
                updateDrawerUserList();
            } catch (err) {
                console.error('Failed to fetch online users:', err);
                document.getElementById('contacts-list').innerHTML = '<div class="text-center text-error/70 py-8">⚠️ Failed to load online users</div>';
            }
        }

        function renderContacts() {
            const container = document.getElementById('contacts-list');
            if (!container) return;
            if (onlineUsers.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 px-4 text-center">
                        <span class="material-symbols-outlined text-6xl text-on-surface-variant/30 mb-4">waving_hand</span>
                        <h3 class="text-base font-semibold text-on-surface mb-1">No other users online</h3>
                        <p class="text-xs text-on-surface-variant/60">Invite a friend or wait for someone to join</p>
                    </div>
                `;
                return;
            }
            let html = '';
            for (const user of onlineUsers) {
                html += `
                    <div class="contact-card glass-panel p-3 rounded-xl flex items-center gap-3 cursor-pointer w-full" data-name="${escapeHtml(user)}">
                        <div class="relative shrink-0">
                            <div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center border border-primary-container/30">
                                <span class="material-symbols-outlined text-primary-container text-3xl">person</span>
                            </div>
                            <span class="absolute bottom-0 right-0 w-3 h-3 bg-primary-container rounded-full border-2 border-background"></span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-headline-md text-sm font-bold text-on-surface truncate">${escapeHtml(user)}</h3>
                            <p class="text-[10px] text-primary-container/80 truncate">Online · Available</p>
                        </div>
                        <a href="/chat?username=${encodeURIComponent(currentUser)}" class="bg-primary-container/20 text-primary-container py-3 px-4 rounded-lg hover:bg-primary-container/30 transition-all shrink-0">
                            <span class="material-symbols-outlined text-2xl">chat_bubble</span>
                        </a>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function updateDrawerUserList() {
            const drawerContainer = document.getElementById('user-list-container');
            if (!drawerContainer) return;
            if (onlineUsers.length === 0) {
                drawerContainer.innerHTML = '<div class="px-3 py-2 text-[9px] text-on-surface-variant/40">No other users online</div>';
                return;
            }
            let html = '';
            onlineUsers.forEach(user => {
                html += `
                    <div class="bg-primary-container/5 border-l-2 border-primary-container px-3 py-2">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 shrink-0 rounded-lg bg-surface-container-high flex items-center justify-center border border-primary-container/20">
                                <span class="material-symbols-outlined text-primary-container text-sm">person</span>
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <h3 class="text-xs font-bold text-on-surface truncate">${escapeHtml(user)}</h3>
                                <p class="text-[9px] text-primary-container/80 truncate">online</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            drawerContainer.innerHTML = html;
        }

        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            if (!searchInput) return;
            searchInput.addEventListener('input', function() {
                const query = this.value.toLowerCase();
                const cards = document.querySelectorAll('.contact-card');
                cards.forEach(card => {
                    const name = card.getAttribute('data-name')?.toLowerCase() || '';
                    if (name.includes(query)) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        }

        function toggleDrawer() {
            const body = document.body;
            if (body.classList.contains('drawer-closed')) {
                body.classList.remove('drawer-closed');
                body.classList.add('drawer-open');
            } else {
                body.classList.remove('drawer-open');
                body.classList.add('drawer-closed');
            }
        }
        document.getElementById('drawer-backdrop').addEventListener('click', toggleDrawer);

        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'class') {
                    if (document.body.classList.contains('drawer-open')) {
                        document.body.style.overflow = 'hidden';
                    } else {
                        document.body.style.overflow = '';
                    }
                }
            });
        });
        observer.observe(document.body, { attributes: true });

        document.getElementById('create-room-btn')?.addEventListener('click', () => window.location.href = '/chat');
        document.getElementById('join-room-btn')?.addEventListener('click', () => window.location.href = '/chat');
        document.getElementById('global-chat-btn')?.addEventListener('click', () => window.location.href = '/chat');

        fetchOnlineUsers();
        setInterval(fetchOnlineUsers, 3000);
        setupSearch();
    </script>
</body>
</html>
