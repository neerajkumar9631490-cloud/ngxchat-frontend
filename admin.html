<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NGX Admin | Neural Gateway</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;family=Inter:wght@400;600&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#00ff41",
                        "surface-dim": "#0c160a",
                        "surface-container-low": "#141e12",
                        "surface-variant": "#2d382a",
                        "surface-container": "#182216",
                        "on-primary": "#003907",
                        "on-surface": "#dae6d2",
                        "background": "#0c160a",
                        "on-surface-variant": "#b9ccb2",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "display-lg": ["Outfit"],
                        "body-md": ["Inter"],
                        "mono-code": ["JetBrains Mono"],
                        "headline-md": ["Outfit"],
                        "label-caps": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0c160a;
            color: #dae6d2;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .neon-glow-hover:hover {
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
            border-color: #00ff41;
        }
        .terminal-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .terminal-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.2);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .log-info { color: #b9ccb2; }
        .log-warn { color: #ffb4ab; }
        .log-success { color: #00ff41; }
        .log-event { color: #72ff70; }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md flex flex-col min-h-screen">
<!-- Header -->
<header class="w-full sticky top-0 z-50 bg-surface-dim/80 backdrop-blur-xl border-b border-white/5 shadow-[0_0_15px_rgba(0,255,65,0.1)] flex justify-between items-center px-6 py-3">
    <div class="font-display-lg text-xl tracking-tighter text-primary-container uppercase">
        NGX ADMIN
    </div>
    <div class="flex items-center gap-3">
        <span class="text-[10px] font-mono-code text-on-surface-variant" id="admin-status">CONNECTING...</span>
        <div class="w-8 h-8 rounded-full border border-primary-container/30 flex items-center justify-center bg-surface-container">
            <span class="material-symbols-outlined text-primary-container text-sm">admin_panel_settings</span>
        </div>
    </div>
</header>
<!-- Main Content -->
<main class="relative z-10 flex-1 w-full max-w-5xl mx-auto px-4 pb-24 pt-6 space-y-6">
    <!-- Health Cards -->
    <section class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div class="glass-card p-4 rounded-xl flex flex-col items-center justify-center text-center transition-all duration-300 neon-glow-hover">
            <span class="font-label-caps text-[10px] text-on-surface-variant mb-1">LATENCY</span>
            <span class="font-display-lg text-3xl text-primary-container" id="latency-value">--</span>
            <div class="mt-2 flex items-center gap-1">
                <div class="w-1.5 h-1.5 rounded-full bg-primary-container animate-pulse"></div>
                <span class="font-label-caps text-[9px] text-primary-container">REAL‑TIME</span>
            </div>
        </div>
        <div class="glass-card p-4 rounded-xl flex flex-col items-center justify-center text-center transition-all duration-300 neon-glow-hover">
            <span class="font-label-caps text-[10px] text-on-surface-variant mb-1">ACTIVE USERS</span>
            <span class="font-display-lg text-3xl text-primary-container" id="active-users">0</span>
            <div class="mt-2 flex items-center gap-1">
                <span class="material-symbols-outlined text-[12px] text-primary-container">group</span>
                <span class="font-label-caps text-[9px] text-primary-container">ONLINE</span>
            </div>
        </div>
        <div class="glass-card p-4 rounded-xl flex flex-col items-center justify-center text-center transition-all duration-300 neon-glow-hover">
            <span class="font-label-caps text-[10px] text-on-surface-variant mb-1">UPTIME</span>
            <span class="font-display-lg text-3xl text-primary-container" id="uptime">0s</span>
            <div class="mt-2 flex items-center gap-1">
                <span class="material-symbols-outlined text-[12px] text-primary-container">schedule</span>
                <span class="font-label-caps text-[9px] text-primary-container">SERVER</span>
            </div>
        </div>
    </section>
    <!-- Real‑time Server Logs (Terminal) -->
    <section class="space-y-2">
        <h2 class="font-label-caps text-[10px] text-primary-container px-1 tracking-wider">LIVE_SERVER_LOGS</h2>
        <div class="glass-card rounded-xl p-4 font-mono-code text-[12px] bg-[#080808]/90 overflow-hidden border-l-2 border-l-primary-container">
            <div class="flex justify-between items-center mb-3 text-[9px] text-on-surface-variant opacity-50">
                <span>ROOT@NGX-CORE: ~/_monitor</span>
                <span id="log-timestamp">--:--:--</span>
            </div>
            <div class="terminal-scroll max-h-96 overflow-y-auto space-y-1.5" id="log-container">
                <p class="log-info">[INIT] Awaiting server events...</p>
            </div>
        </div>
    </section>
</main>
<!-- Footer -->
<footer class="text-center text-[8px] text-on-surface-variant/30 py-4">
    <span class="font-mono-code">NGX ADMIN TERMINAL v1.0 | RESTRICTED ACCESS</span>
</footer>
<script>
        // ---------- Backend URL ----------
        const BACKEND_URL = "https://ngxchat-backend-production.up.railway.app";

        let socket;
        let startTime = Date.now();
        let activeUserCount = 0;

        const logContainer = document.getElementById('log-container');
        const logTimestampSpan = document.getElementById('log-timestamp');
        const latencySpan = document.getElementById('latency-value');
        const activeUsersSpan = document.getElementById('active-users');
        const uptimeSpan = document.getElementById('uptime');
        const adminStatusSpan = document.getElementById('admin-status');

        function formatTime(ms) {
            let seconds = Math.floor(ms / 1000);
            let hours = Math.floor(seconds / 3600);
            let minutes = Math.floor((seconds % 3600) / 60);
            let secs = seconds % 60;
            return `${hours}h ${minutes}m ${secs}s`;
        }

        function addLog(message, type = 'info') {
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            const logDiv = document.createElement('p');
            let className = 'log-info';
            if (type === 'warn') className = 'log-warn';
            if (type === 'success') className = 'log-success';
            if (type === 'event') className = 'log-event';
            logDiv.className = className;
            logDiv.innerHTML = `<span class="text-primary-container/60 mr-2">[${timeStr}]</span> ${message}`;
            logContainer.appendChild(logDiv);
            logContainer.scrollTop = logContainer.scrollHeight;
            while (logContainer.children.length > 200) logContainer.removeChild(logContainer.firstChild);
            logTimestampSpan.innerText = timeStr;
        }

        function updateUptime() {
            const elapsed = Date.now() - startTime;
            uptimeSpan.innerText = formatTime(elapsed);
        }

        function initSocket() {
            // ---------- Use BACKEND_URL ----------
            socket = io(BACKEND_URL);
            socket.on('connect', () => {
                adminStatusSpan.innerText = 'CONNECTED';
                addLog('Admin socket connected', 'success');
                socket.emit('admin_join');
            });
            socket.on('disconnect', () => {
                adminStatusSpan.innerText = 'DISCONNECTED';
                addLog('Admin socket disconnected', 'warn');
            });
            socket.on('admin_log', (data) => {
                addLog(data.message, data.type);
                if (data.userCount !== undefined) {
                    activeUserCount = data.userCount;
                    activeUsersSpan.innerText = activeUserCount;
                }
                if (data.latency !== undefined) latencySpan.innerText = data.latency + 'ms';
            });
            setInterval(() => {
                if (socket && socket.connected) {
                    const start = Date.now();
                    socket.emit('admin_ping', { time: start });
                    socket.once('admin_pong', (data) => {
                        const latency = Date.now() - data.time;
                        latencySpan.innerText = latency + 'ms';
                    });
                }
            }, 3000);
        }

        setInterval(updateUptime, 1000);
        initSocket();
    </script>
</body>
</html>
